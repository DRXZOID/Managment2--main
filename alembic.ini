[alembic]
script_location = migrations
# sqlalchemy.url is intentionally NOT set here.
# The URL is resolved at runtime from the DATABASE_URL environment variable
# (see migrations/env.py).  For SQLite local dev the default is used when
# DATABASE_URL is unset.
#
# PostgreSQL usage:
#   export DATABASE_URL=postgresql+psycopg2://user:pass@host/dbname
#   alembic upgrade head
#
# SQLite local dev (default — no env var needed):
#   alembic upgrade head

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

