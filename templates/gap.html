<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricewatch – Розрив асортименту</title>
    <style>
        :root {
            --bg: #f6f4ff;
            --panel: #ffffff;
            --accent: #5b5bd6;
            --accent-dark: #403ea3;
            --text: #1f2343;
            --muted: #6b6f85;
            --border: #e4e7f1;
            --success-bg: #d1fae5;
            --success-text: #065f46;
            --warn-bg: #fef3c7;
            --warn-text: #92400e;
            --info-bg: #eff6ff;
            --info-text: #1e40af;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #403ea3, #7f7ff5);
            padding: 28px 24px;
            color: white;
        }
        header h1 { margin: 0; font-size: 1.8rem; }
        header p { margin: 6px 0 14px; opacity: 0.85; }
        header .nav-links { display: flex; gap: 14px; }
        header .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        header .nav-links a:hover { color: white; text-decoration: underline; }

        main { padding: 24px; max-width: 1280px; margin: 0 auto; }
        .panel {
            background: var(--panel);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(82,86,133,0.1);
            margin-bottom: 24px;
        }
        .panel h2 { margin-top: 0; font-size: 1.15rem; color: var(--text); }

        /* Filter bar */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            align-items: end;
        }
        label { font-weight: 600; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        select, input[type=text] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            background: #fff;
        }
        select:focus, input[type=text]:focus { outline: 2px solid var(--accent); }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding-top: 4px; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 6px; margin: 0; cursor: pointer; }
        .checkbox-group input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }
        .multi-select-container {
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 160px;
            overflow-y: auto;
            padding: 8px;
            background: #fafaff;
        }
        .multi-select-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .multi-select-item:hover { background: #f0f2ff; }
        .multi-select-item input[type=checkbox] { accent-color: var(--accent); }

        .btn {
            display: inline-block;
            padding: 10px 22px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--accent-dark); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.82rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-action-take { background: var(--info-bg); color: var(--info-text); }
        .btn-action-take:hover { background: #dbeafe; }
        .btn-action-done { background: var(--warn-bg); color: var(--warn-text); }
        .btn-action-done:hover { background: #fde68a; }

        /* Summary cards */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--panel);
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 6px 18px rgba(82,86,133,0.08);
            text-align: center;
        }
        .summary-card .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .summary-card .lbl { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

        /* Groups & tables */
        .group-block { margin-bottom: 28px; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .group-header h3 { margin: 0; font-size: 1rem; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-cat { background: #ede9fe; color: #5b21b6; }
        .badge-new { background: #e0f2fe; color: #0369a1; }
        .badge-in_progress { background: var(--warn-bg); color: var(--warn-text); }
        .badge-done { background: var(--success-bg); color: var(--success-text); }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            vertical-align: middle;
        }
        th { font-weight: 600; color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:hover td { background: #fafaff; }
        .avail-yes { color: #059669; font-weight: 600; }
        .avail-no { color: #dc2626; font-weight: 600; }
        .price-cell { font-weight: 600; white-space: nowrap; }
        .link-ext { color: var(--accent); text-decoration: none; font-size: 0.82rem; }
        .link-ext:hover { text-decoration: underline; }

        /* States */
        .status-msg {
            padding: 14px 18px;
            border-radius: 12px;
            background: #eef1ff;
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }
        .status-msg.error { background: #fee2e2; color: #991b1b; }
        .status-msg.warn { background: var(--warn-bg); color: var(--warn-text); }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid rgba(91,91,214,0.25);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<header>
    <h1>📋 Розрив асортименту</h1>
    <p>Товари цільового магазину, які відсутні у референсному асортименті</p>
    <div class="nav-links">
        <a href="/">← Головна</a>
        <a href="/service">🔧 Service Console</a>
    </div>
</header>

<main>

    <!-- =============== FILTER PANEL =============== -->
    <section class="panel">
        <h2>Параметри перегляду</h2>
        <div class="filter-grid">

            <div>
                <label for="targetStoreSelect">Цільовий магазин</label>
                <select id="targetStoreSelect">
                    <option value="">— оберіть магазин —</option>
                </select>
            </div>

            <div>
                <label for="refCategorySelect">Референсна категорія</label>
                <select id="refCategorySelect" disabled>
                    <option value="">— спочатку оберіть магазин —</option>
                </select>
            </div>

            <div>
                <label>Цільові категорії (з маппінгів)</label>
                <div class="multi-select-container" id="targetCatsContainer">
                    <span class="status-msg" style="padding:6px;font-size:0.85rem;" id="targetCatsPlaceholder">Оберіть референсну категорію</span>
                </div>
            </div>

            <div>
                <label for="searchInput">Пошук за назвою</label>
                <input type="text" id="searchInput" placeholder="напр. Bauer Vapor…">
            </div>

            <div>
                <label>Фільтри</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="filterAvailable"> Лише в наявності</label>
                </div>
            </div>

            <div>
                <label>Статуси</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="statusNew" checked> Нові</label>
                    <label><input type="checkbox" id="statusInProgress" checked> В роботі</label>
                    <label><input type="checkbox" id="statusDone"> Опрацьовано</label>
                </div>
            </div>

        </div>

        <div style="margin-top:18px;">
            <button class="btn" id="loadGapBtn" disabled>Показати розрив</button>
            <span id="noMappingsWarning" class="hidden" style="margin-left:14px;color:#92400e;font-size:0.9rem;">
                ⚠️ Для цієї категорії немає маппінгів — налаштуйте їх на <a href="/service">сервісній сторінці</a>.
            </span>
        </div>
    </section>

    <!-- =============== SUMMARY =============== -->
    <div class="summary-row hidden" id="summaryRow">
        <div class="summary-card">
            <div class="num" id="sumTotal">0</div>
            <div class="lbl">Усього</div>
        </div>
        <div class="summary-card">
            <div class="num" id="sumNew">0</div>
            <div class="lbl">Нові</div>
        </div>
        <div class="summary-card">
            <div class="num" id="sumInProgress">0</div>
            <div class="lbl">В роботі</div>
        </div>
        <div class="summary-card">
            <div class="num" id="sumDone">0</div>
            <div class="lbl">Опрацьовано</div>
        </div>
    </div>

    <!-- =============== STATUS / SPINNER =============== -->
    <div id="statusArea"></div>

    <!-- =============== RESULTS =============== -->
    <div id="resultsArea"></div>

</main>

<script>
// =========================================================================
// State
// =========================================================================
const state = {
    targetStoreId: null,
    refStores: [],
    targetStores: [],
    refCategories: [],
    mappedTargetCats: [],   // [{target_category_id, target_category_name}]
};

// =========================================================================
// DOM refs
// =========================================================================
const $targetStoreSelect = document.getElementById('targetStoreSelect');
const $refCategorySelect  = document.getElementById('refCategorySelect');
const $targetCatsContainer = document.getElementById('targetCatsContainer');
const $targetCatsPlaceholder = document.getElementById('targetCatsPlaceholder');
const $searchInput        = document.getElementById('searchInput');
const $filterAvailable    = document.getElementById('filterAvailable');
const $statusNew          = document.getElementById('statusNew');
const $statusInProgress   = document.getElementById('statusInProgress');
const $statusDone         = document.getElementById('statusDone');
const $loadGapBtn         = document.getElementById('loadGapBtn');
const $noMappingsWarning  = document.getElementById('noMappingsWarning');
const $summaryRow         = document.getElementById('summaryRow');
const $statusArea         = document.getElementById('statusArea');
const $resultsArea        = document.getElementById('resultsArea');

// =========================================================================
// Init
// =========================================================================
async function init() {
    showStatus('Завантаження магазинів…');
    try {
        const res = await fetch('/api/stores');
        const data = await res.json();
        const stores = data.stores || [];
        state.refStores    = stores.filter(s => s.is_reference);
        state.targetStores = stores.filter(s => !s.is_reference);

        // Populate target store selector
        $targetStoreSelect.innerHTML = '<option value="">— оберіть магазин —</option>';
        state.targetStores.forEach(s => {
            const o = document.createElement('option');
            o.value = s.id;
            o.textContent = s.name;
            $targetStoreSelect.appendChild(o);
        });
        hideStatus();
    } catch(e) {
        showStatus('Помилка завантаження магазинів: ' + e.message, 'error');
    }
}

// =========================================================================
// Target store selected → load reference categories
// =========================================================================
$targetStoreSelect.addEventListener('change', async () => {
    state.targetStoreId = $targetStoreSelect.value || null;
    $refCategorySelect.innerHTML = '<option value="">— завантаження… —</option>';
    $refCategorySelect.disabled = true;
    clearMappedCats();
    $loadGapBtn.disabled = true;
    $noMappingsWarning.classList.add('hidden');

    if (!state.targetStoreId) {
        $refCategorySelect.innerHTML = '<option value="">— спочатку оберіть магазин —</option>';
        return;
    }

    try {
        // Load reference store categories
        if (state.refStores.length === 0) {
            $refCategorySelect.innerHTML = '<option value="">Немає референсного магазину</option>';
            return;
        }
        const refStore = state.refStores[0];
        const res = await fetch(`/api/stores/${refStore.id}/categories`);
        const data = await res.json();
        state.refCategories = data.categories || [];

        $refCategorySelect.innerHTML = '<option value="">— оберіть категорію —</option>';
        state.refCategories.forEach(c => {
            const o = document.createElement('option');
            o.value = c.id;
            o.textContent = c.name + (c.product_count ? ` (${c.product_count})` : '');
            $refCategorySelect.appendChild(o);
        });
        $refCategorySelect.disabled = false;
    } catch(e) {
        $refCategorySelect.innerHTML = '<option value="">Помилка завантаження</option>';
    }
});

// =========================================================================
// Ref category selected → load mapped target categories
// =========================================================================
$refCategorySelect.addEventListener('change', async () => {
    const refCatId = $refCategorySelect.value;
    clearMappedCats();
    $loadGapBtn.disabled = true;
    $noMappingsWarning.classList.add('hidden');

    if (!refCatId || !state.targetStoreId) return;

    $targetCatsPlaceholder.textContent = 'Завантаження маппінгів…';
    $targetCatsPlaceholder.classList.remove('hidden');

    try {
        const res = await fetch(`/api/categories/${refCatId}/mapped-target-categories?target_store_id=${state.targetStoreId}`);
        const data = await res.json();
        state.mappedTargetCats = data.mapped_target_categories || [];

        $targetCatsPlaceholder.classList.add('hidden');

        if (state.mappedTargetCats.length === 0) {
            $noMappingsWarning.classList.remove('hidden');
            $targetCatsPlaceholder.textContent = 'Немає маппінгів для цієї категорії';
            $targetCatsPlaceholder.classList.remove('hidden');
            $loadGapBtn.disabled = true;
            return;
        }

        // Render checkboxes — all checked by default
        state.mappedTargetCats.forEach(cat => {
            const label = document.createElement('label');
            label.className = 'multi-select-item';
            label.innerHTML = `<input type="checkbox" value="${cat.target_category_id}" checked>
                <span>${escHtml(cat.target_category_name)}</span>`;
            $targetCatsContainer.appendChild(label);
            label.querySelector('input').addEventListener('change', updateLoadBtn);
        });

        updateLoadBtn();
    } catch(e) {
        $targetCatsPlaceholder.textContent = 'Помилка завантаження маппінгів';
        $targetCatsPlaceholder.classList.remove('hidden');
    }
});

function clearMappedCats() {
    state.mappedTargetCats = [];
    // Remove all checkbox labels, keep placeholder
    const items = $targetCatsContainer.querySelectorAll('.multi-select-item');
    items.forEach(el => el.remove());
    $targetCatsPlaceholder.textContent = 'Оберіть референсну категорію';
    $targetCatsPlaceholder.classList.remove('hidden');
}

function updateLoadBtn() {
    const anyChecked = $targetCatsContainer.querySelectorAll('input[type=checkbox]:checked').length > 0;
    $loadGapBtn.disabled = !anyChecked;
}

// =========================================================================
// Load gap data
// =========================================================================
$loadGapBtn.addEventListener('click', loadGap);

async function loadGap() {
    const refCatId = parseInt($refCategorySelect.value, 10);
    const targetStoreId = parseInt(state.targetStoreId, 10);

    const checkedIds = Array.from(
        $targetCatsContainer.querySelectorAll('input[type=checkbox]:checked')
    ).map(el => parseInt(el.value, 10));

    if (!checkedIds.length) return;

    const statuses = [];
    if ($statusNew.checked)        statuses.push('new');
    if ($statusInProgress.checked) statuses.push('in_progress');
    if ($statusDone.checked)       statuses.push('done');

    const body = {
        target_store_id:       targetStoreId,
        reference_category_id: refCatId,
        target_category_ids:   checkedIds,
        search:                $searchInput.value.trim() || null,
        only_available:        $filterAvailable.checked || null,
        statuses:              statuses.length ? statuses : ['new', 'in_progress'],
    };

    showStatus('<span class="spinner"></span> Завантаження розриву…');
    $summaryRow.classList.add('hidden');
    $resultsArea.innerHTML = '';

    try {
        const res = await fetch('/api/gap', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
            showStatus('Помилка: ' + (data.error || res.statusText), 'error');
            return;
        }
        hideStatus();
        renderSummary(data.summary);
        renderGroups(data.groups, refCatId);
    } catch(e) {
        showStatus('Помилка запиту: ' + e.message, 'error');
    }
}

// =========================================================================
// Render summary
// =========================================================================
function renderSummary(summary) {
    document.getElementById('sumTotal').textContent      = summary.total      || 0;
    document.getElementById('sumNew').textContent        = summary.new        || 0;
    document.getElementById('sumInProgress').textContent = summary.in_progress || 0;
    document.getElementById('sumDone').textContent       = summary.done       || 0;
    $summaryRow.classList.remove('hidden');
}

// =========================================================================
// Render groups
// =========================================================================
function renderGroups(groups, refCatId) {
    if (!groups || groups.length === 0) {
        $resultsArea.innerHTML = '<div class="status-msg">Розрив відсутній або всі товари відфільтровані.</div>';
        return;
    }

    const html = groups.map(group => {
        const catName = (group.target_category && group.target_category.name) || '—';
        const rows = (group.items || []).map(item => renderItemRow(item, refCatId)).join('');
        return `
        <div class="group-block panel">
            <div class="group-header">
                <h3>${escHtml(catName)}</h3>
                <span class="badge badge-cat">${group.count} товарів</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Назва</th>
                        <th>Ціна</th>
                        <th>Наявність</th>
                        <th>Статус</th>
                        <th>Дія</th>
                        <th>Посилання</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }).join('');

    $resultsArea.innerHTML = html;

    // Attach action button handlers
    $resultsArea.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', handleAction);
    });
}

function renderItemRow(item, refCatId) {
    const p = item.target_product || {};
    const status = item.status || 'new';
    const price = p.price != null ? `${p.price} ${p.currency || ''}`.trim() : '—';
    const avail = p.is_available
        ? '<span class="avail-yes">✓ є</span>'
        : '<span class="avail-no">✗ нема</span>';
    const badgeClass = `badge badge-${status}`;
    const badgeLabel = { new: 'Новий', in_progress: 'В роботі', done: 'Опрацьовано' }[status] || status;
    const link = p.product_url
        ? `<a class="link-ext" href="${escAttr(p.product_url)}" target="_blank" rel="noopener">↗</a>`
        : '—';

    let actionBtn = '';
    if (status === 'new') {
        actionBtn = `<button class="btn-sm btn-action-take" data-action="in_progress"
            data-ref-cat="${refCatId}" data-prod-id="${p.id}">Взяти в роботу</button>`;
    } else if (status === 'in_progress') {
        actionBtn = `<button class="btn-sm btn-action-done" data-action="done"
            data-ref-cat="${refCatId}" data-prod-id="${p.id}">Позначити опрацьованим</button>`;
    } else {
        actionBtn = `<span class="badge badge-done">✓</span>`;
    }

    return `<tr data-prod-id="${p.id}">
        <td>${escHtml(p.name || '—')}</td>
        <td class="price-cell">${escHtml(price)}</td>
        <td>${avail}</td>
        <td><span class="${badgeClass}">${badgeLabel}</span></td>
        <td>${actionBtn}</td>
        <td>${link}</td>
    </tr>`;
}

// =========================================================================
// Action handler (status change)
// =========================================================================
async function handleAction(e) {
    const btn = e.currentTarget;
    const newStatus    = btn.dataset.action;
    const refCatId     = parseInt(btn.dataset.refCat, 10);
    const prodId       = parseInt(btn.dataset.prodId, 10);

    btn.disabled = true;
    btn.textContent = '…';

    try {
        const res = await fetch('/api/gap/status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                reference_category_id: refCatId,
                target_product_id: prodId,
                status: newStatus,
            }),
        });
        const data = await res.json();
        if (!res.ok) {
            alert('Помилка: ' + (data.error || res.statusText));
            btn.disabled = false;
            btn.textContent = newStatus === 'in_progress' ? 'Взяти в роботу' : 'Позначити опрацьованим';
            return;
        }
        // Reload gap to reflect updated statuses & summary
        await loadGap();
    } catch(e) {
        alert('Помилка: ' + e.message);
        btn.disabled = false;
    }
}

// =========================================================================
// Helpers
// =========================================================================
function showStatus(msg, type) {
    const cls = type === 'error' ? 'error' : type === 'warn' ? 'warn' : '';
    $statusArea.innerHTML = `<div class="status-msg ${cls}">${msg}</div>`;
}
function hideStatus() { $statusArea.innerHTML = ''; }

function escHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
function escAttr(str) { return escHtml(str); }

// =========================================================================
// Boot
// =========================================================================
init();
</script>
</body>
</html>
