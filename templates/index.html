<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Порівняння товарів</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: black;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: 30% 1fr;
            align-items: flex-start;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 14px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            flex-wrap: wrap;
        }

        .panel-subtitle {
            margin-top: 6px;
            color: #555;
            font-size: 0.95em;
        }

        #referenceSearch {
            min-width: 200px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            padding: 10px 14px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #referenceSearch:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
        }

        .reference-panel {
            height: 50vh;
            max-height: 50vh;
            gap: 12px;
            overflow: hidden;
        }

        .reference-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 180px;
            flex: 1;
            overflow-y: auto;
        }

        .reference-card {
            border-radius: 10px;
            border: 1px solid #e2e9ff;
            background: #fbfdff;
            box-shadow: inset 0 0 0 1px rgba(102, 126, 234, 0.15);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .reference-card-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .reference-card h3 {
            font-size: 1.05em;
            color: #1d1d1d;
            font-weight: 600;
        }

        .reference-card-source {
            font-size: 0.9em;
            color: #5c6373;
        }

        .reference-card-price {
            font-weight: 700;
            color: #2c6dfc;
            white-space: nowrap;
        }

        .reference-card-link {
            text-decoration: none;
            color: #2c6dfc;
            font-weight: 600;
            font-size: 0.9em;
            align-self: flex-start;
        }

        .reference-loading {
            display: none;
            align-items: center;
            gap: 10px;
            color: #667eea;
            border-radius: 10px;
            border: 1px solid rgba(102, 126, 234, 0.25);
            background: #f5f7ff;
            padding: 12px 16px;
        }

        .reference-loading.visible {
            display: flex;
        }

        .reference-error {
            display: none;
            background: #fff5f5;
            border: 1px solid #f5c2c7;
            color: #b91c1c;
            padding: 12px 14px;
            border-radius: 8px;
        }

        .reference-error.visible {
            display: block;
        }

        .reference-sentinel {
            height: 1px;
        }

        .spinner.small {
            width: 30px;
            height: 30px;
            border-width: 3px;
        }

        .results-section {
            display: none;
        }

        .results-section.visible {
            display: block;
        }

        .results-panel {
            background: transparent;
            box-shadow: none;
            padding: 0;
            gap: 0;
        }

        .results-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .url-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .url-input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"],
        select {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-section select {
            max-width: 300px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: #4CAF50;
            color: white;
            align-self: flex-start;
        }

        .btn-add:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-remove {
            background: #f44336;
            color: white;
            padding: 10px 16px;
            font-size: 0.9em;
        }

        .btn-remove:hover {
            background: #da190b;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            display: none;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 4px solid #c62828;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .stats {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .stats-text {
            font-size: 1.1em;
            color: #333;
            margin: 5px 0;
        }

        .stats-text strong {
            color: #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .group-block {
            border: 1px solid #e6eefc;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 6px;
            background: #fbfeff;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .group-meta {
            color: #555;
            font-size: 0.95em;
            margin-left: 10px;
        }

        .group-table th {
            background: #eef6ff;
            color: #1b3b6f;
            padding: 8px 12px;
        }

        .group-table td {
            padding: 10px 12px;
            border-bottom: 1px dashed #e6eefc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-radius: 5px 5px 0 0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            word-break: break-word;
        }

        tr:hover {
            background: #f5f5f5;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .source-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #999;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 1.05em;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .input-section {
                padding: 20px;
            }

            table {
                font-size: 0.9em;
            }

            td, th {
                padding: 10px;
            }

            .reference-panel,
            .reference-list {
                min-height: auto;
            }

            .panel-header {
                flex-direction: column;
                align-items: flex-start;
            }

            #referenceSearch {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-grid">
            <section class="left-column">
                <div class="input-section">
                    <form id="compareForm">
                        <div class="form-group">
                            <label for="category">Категорія:</label>
                            <select id="category">
                                <option value="">(не вказано)</option>
                                <!-- additional options will be injected by JS -->
                            </select>
                            <label for="urlInputs">Посилання на інші магазини:</label>
                            <div class="url-inputs" id="urlInputs">
                                <div class="url-input-row">
                                    <label style="display:none">Adapter</label>
                                    <select class="adapter-select" aria-label="adapter-select"></select>
                                    <label style="display:none">Category</label>
                                    <select class="category-select" aria-label="category-select"></select>
                                    <button type="button" class="btn-remove" onclick="removeUrlRow(this)">Видалити</button>
                                </div>
                            </div>
                            <button type="button" class="btn-add" onclick="addUrlRow()">+ Додати ще посилання</button>
                        </div>
                        <button type="submit" class="btn-submit" id="submitBtn">Перевірити відсутні</button>
                    </form>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Парсинг товарів із посилань...</p>
                </div>

                <div class="error" id="error"></div>
            </section>

            <section class="right-column">
                <div class="reference-panel panel">
                    <div class="panel-header">
                        <div>
                            <h2>📦 Товари референсного каталогу</h2>
                            <p id="referenceSummary" class="panel-subtitle">Оберіть категорію, щоб побачити товари справочника.</p>
                        </div>
                        <input type="text" id="referenceSearch" placeholder="Пошук у списку товарів" />
                    </div>
                    <div id="referenceLoading" class="reference-loading">
                        <div class="spinner small"></div>
                        <p>Завантаження товарів...</p>
                    </div>
                    <div id="referenceError" class="reference-error"></div>
                    <div id="referenceList" class="reference-list">
                        <p class="no-data">Оберіть категорію, щоб побачити товари справочника.</p>
                    </div>
                    <div id="referenceSentinel" class="reference-sentinel"></div>
                </div>

                <div class="results-section results-panel" id="results">
                    <div class="results-container">
                        <div class="stats" id="stats"></div>

                        <h2>🔎 Знайдені товари, яких немає на prohockey.com.ua</h2>
                        <div id="allProductsContainer" class="table-wrapper">
                            <p class="no-data">Результатів немає</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const REFERENCE_PAGE_SIZE = 20;
        const referenceCache = {};
        const referenceState = {
            category: '',
            search: '',
            nextPage: 1,
            hasMore: true,
            loading: false,
        };
        let referenceDebounceTimer;
        let referenceObserver;
        let _adapters = [];

        async function initialize() {
            await loadAdapters();
            await loadReferenceCategories();
            await setupCompareRows();
            setupReferencePanel();
        }

        async function setupCompareRows() {
            const rows = document.querySelectorAll('.url-input-row');
            for (const row of rows) {
                const adapterSel = row.querySelector('.adapter-select');
                const catSel = row.querySelector('.category-select');
                populateAdapterOptions(adapterSel);
                adapterSel.addEventListener('change', () => onAdapterChange(adapterSel, catSel));
                if (adapterSel.options.length > 1) {
                    adapterSel.selectedIndex = 1;
                    await onAdapterChange(adapterSel, catSel);
                }
            }
        }

        async function loadAdapters() {
            try {
                const resp = await fetch('/api/adapters');
                if (!resp.ok) return;
                const data = await resp.json();
                _adapters = data.adapters || [];
            } catch (e) {
                console.error('failed to load adapters', e);
            }
        }

        async function loadReferenceCategories() {
            try {
                const resp = await fetch('/api/categories');
                if (!resp.ok) return;
                const data = await resp.json();
                const cats = data.categories || [];
                const sel = document.getElementById('category');
                sel.querySelectorAll('option:not([value=""])').forEach(o => o.remove());
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    if (typeof c === 'string') {
                        opt.value = c;
                        opt.textContent = c;
                    } else if (c && typeof c === 'object') {
                        opt.value = c.url || c.name || c;
                        opt.textContent = c.name || c.url || c;
                    }
                    sel.appendChild(opt);
                });
            } catch (e) {
                console.error('failed to load reference categories', e);
            }
        }

        function populateAdapterOptions(select) {
            select.innerHTML = '';
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '(виберіть адаптер)';
            select.appendChild(placeholder);
            _adapters.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.name;
                opt.textContent = a.name + (a.domains && a.domains.length ? ' (' + a.domains[0] + ')' : '');
                select.appendChild(opt);
            });
        }

        async function onAdapterChange(adapterSel, catSel) {
            const adapterName = adapterSel.value;
            catSel.innerHTML = '';
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '(категорія)';
            catSel.appendChild(placeholder);
            if (!adapterName) return;
            try {
                const resp = await fetch('/api/adapters/' + encodeURIComponent(adapterName) + '/categories');
                if (!resp.ok) return;
                const data = await resp.json();
                const cats = data.categories || [];
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    if (typeof c === 'string') {
                        opt.value = c;
                        opt.textContent = c;
                    } else if (c && typeof c === 'object') {
                        opt.value = c.url || c.name;
                        opt.textContent = c.name || c.url || '';
                    }
                    catSel.appendChild(opt);
                });
            } catch (e) {
                console.error('failed to load categories for', adapterName, e);
            }
        }

        function addUrlRow() {
            const urlInputs = document.getElementById('urlInputs');
            const newRow = document.createElement('div');
            newRow.className = 'url-input-row';
            newRow.innerHTML = `
                <label style="display:none">Adapter</label>
                <select class="adapter-select" aria-label="adapter-select"></select>
                <label style="display:none">Category</label>
                <select class="category-select" aria-label="category-select"></select>
                <button type="button" class="btn-remove" onclick="removeUrlRow(this)">Видалити</button>
            `;
            urlInputs.appendChild(newRow);
            const adapterSel = newRow.querySelector('.adapter-select');
            const catSel = newRow.querySelector('.category-select');
            populateAdapterOptions(adapterSel);
            adapterSel.addEventListener('change', () => onAdapterChange(adapterSel, catSel));
            if (adapterSel.options.length > 1) {
                adapterSel.selectedIndex = 1;
                onAdapterChange(adapterSel, catSel);
            }
        }

        function removeUrlRow(button) {
            button.parentElement.remove();
        }

        function setupReferencePanel() {
            const searchInput = document.getElementById('referenceSearch');
            const categorySelect = document.getElementById('category');
            searchInput.addEventListener('input', () => {
                clearTimeout(referenceDebounceTimer);
                referenceDebounceTimer = setTimeout(handleReferenceFilterChange, 350);
            });
            categorySelect.addEventListener('change', handleReferenceFilterChange);
            bindReferenceObserver();
            handleReferenceFilterChange();
        }

        function handleReferenceFilterChange() {
            const category = document.getElementById('category').value;
            const search = document.getElementById('referenceSearch').value.trim();
            referenceState.category = category;
            referenceState.search = search;
            referenceState.nextPage = 1;
            referenceState.hasMore = true;
            referenceState.loading = false;
            clearReferenceList();
            hideReferenceError();
            updateReferenceSummary(null);
            if (!category) {
                referenceState.hasMore = false;
                showReferencePlaceholder('Оберіть категорію, щоб побачити товари справочника.');
                return;
            }
            showReferencePlaceholder('Дані завантажуються...');
            loadReferencePage(1);
        }

        function clearReferenceList() {
            document.getElementById('referenceList').innerHTML = '';
        }

        function showReferencePlaceholder(message) {
            const list = document.getElementById('referenceList');
            list.innerHTML = `<p class="no-data">${escapeHtml(message)}</p>`;
        }

        function updateReferenceSummary(total = null) {
            const summary = document.getElementById('referenceSummary');
            const parts = [];
            if (referenceState.category) {
                parts.push(`Категорія: ${referenceState.category}`);
            }
            if (total !== null && total !== undefined) {
                parts.push(`Всього: ${total}`);
            }
            summary.textContent = parts.join(' • ') || 'Оберіть категорію, щоб побачити товари справочника.';
        }

        function bindReferenceObserver() {
            const sentinel = document.getElementById('referenceSentinel');
            if (!sentinel || typeof IntersectionObserver === 'undefined') return;
            if (referenceObserver) {
                referenceObserver.disconnect();
            }
            referenceObserver = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && referenceState.hasMore && !referenceState.loading && referenceState.category) {
                        loadReferencePage(referenceState.nextPage);
                    }
                });
            }, {
                root: null,
                rootMargin: '200px',
                threshold: 0.1,
            });
            referenceObserver.observe(sentinel);
        }

        function getReferenceCacheKey(category, search) {
            return `${category}||${search}`;
        }

        function ensureReferenceCache(key) {
            if (!referenceCache[key]) {
                referenceCache[key] = {
                    pages: {},
                    total: null,
                };
            }
            return referenceCache[key];
        }

        async function loadReferencePage(pageToLoad) {
            if (!referenceState.category || referenceState.loading || !referenceState.hasMore) {
                return;
            }
            const cacheKey = getReferenceCacheKey(referenceState.category, referenceState.search);
            const cacheEntry = ensureReferenceCache(cacheKey);
            const cachedItems = cacheEntry.pages[pageToLoad];
            if (cachedItems) {
                appendReferenceItems(cachedItems);
                const total = cacheEntry.total ?? null;
                referenceState.hasMore = total !== null ? (pageToLoad * REFERENCE_PAGE_SIZE) < total : true;
                referenceState.nextPage = pageToLoad + 1;
                updateReferenceSummary(total);
                return;
            }
            referenceState.loading = true;
            showReferenceLoading(true);
            hideReferenceError();
            try {
                const params = new URLSearchParams();
                params.set('category', referenceState.category);
                params.set('page', pageToLoad.toString());
                params.set('page_size', REFERENCE_PAGE_SIZE.toString());
                if (referenceState.search) {
                    params.set('q', referenceState.search);
                }
                const response = await fetch(`/api/reference-products?${params.toString()}`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Помилка при завантаженні товарів');
                }
                const items = data.items || [];
                cacheEntry.pages[pageToLoad] = items;
                cacheEntry.total = data.total ?? 0;
                referenceState.hasMore = data.has_more !== false && (pageToLoad * REFERENCE_PAGE_SIZE) < cacheEntry.total;
                referenceState.nextPage = pageToLoad + 1;
                updateReferenceSummary(cacheEntry.total);
                if (!cacheEntry.total) {
                    showReferencePlaceholder(referenceState.search ? 'За вашим запитом нічого не знайдено.' : 'У цій категорії поки що немає товарів.');
                    return;
                }
                if (items.length === 0 && pageToLoad === 1) {
                    showReferencePlaceholder(referenceState.search ? 'За вашим запитом нічого не знайдено.' : 'У цій категорії поки що немає товарів.');
                } else {
                    appendReferenceItems(items);
                }
            } catch (error) {
                showReferenceError(error.message || 'Не вдалося завантажити товари зі справочника.');
                referenceState.hasMore = false;
            } finally {
                referenceState.loading = false;
                showReferenceLoading(false);
            }
        }

        function appendReferenceItems(items) {
            if (!items || !items.length) return;
            const list = document.getElementById('referenceList');
            const placeholder = list.querySelector('.no-data');
            if (placeholder) {
                placeholder.remove();
            }
            const fragment = document.createDocumentFragment();
            items.forEach(item => fragment.appendChild(createReferenceCard(item)));
            list.appendChild(fragment);
        }

        function createReferenceCard(item) {
            const card = document.createElement('article');
            card.className = 'reference-card';
            const title = escapeHtml(item.name || '—');
            const source = escapeHtml(item.source_site || 'prohockey.com.ua');
            const priceText = escapeHtml(
                item.price != null
                    ? `${item.price} ${item.currency || ''}`.trim()
                    : item.price_raw || '—'
            );
            card.innerHTML = `
                <div class="reference-card-body">
                    <div>
                        <h3>${title}</h3>
                        <p class="reference-card-source">${source}</p>
                    </div>
                    <div class="reference-card-price">${priceText}</div>
                </div>
            `;
            if (item.url) {
                const link = document.createElement('a');
                link.className = 'reference-card-link';
                link.href = item.url;
                link.target = '_blank';
                link.rel = 'noreferrer';
                link.textContent = 'Переглянути';
                card.appendChild(link);
            }
            return card;
        }

        function showReferenceLoading(show) {
            document.getElementById('referenceLoading').classList.toggle('visible', show);
        }

        function showReferenceError(message) {
            const errorNode = document.getElementById('referenceError');
            errorNode.textContent = message;
            errorNode.classList.add('visible');
        }

        function hideReferenceError() {
            document.getElementById('referenceError').classList.remove('visible');
        }

        document.addEventListener('DOMContentLoaded', initialize);

        document.getElementById('compareForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const category = document.getElementById('category').value;
            const rows = document.querySelectorAll('.url-input-row');
            const urls = Array.from(rows).map(row => {
                const catSel = row.querySelector('.category-select');
                return (catSel && catSel.value) ? catSel.value : '';
            }).filter(v => v);

            if (urls.length === 0) {
                showError('Будь ласка, виберіть принаймні одну пару адаптер/категорія');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ urls, category })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Помилка при парсингу');
                    showLoading(false);
                    return;
                }

                displayResults(data);
                showLoading(false);
            } catch (error) {
                showError('Помилка підключення: ' + error.message);
                showLoading(false);
            }
        });

        function displayResults(data) {
            const statsHtml = `
                <div class="stats-text">🧮 Перевірено посилань: <strong>${data.total_urls || 0}</strong></div>
                <div class="stats-text">🚫 Відсутніх товарів: <strong>${data.total || 0}</strong></div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;

            const container = document.getElementById('allProductsContainer');
            if (data.missing && data.missing.length > 0) {
                container.innerHTML = createTableWithStatus(data.missing);
            } else {
                container.innerHTML = '<p class="no-data">Не знайдено відсутніх товарів</p>';
            }

            document.getElementById('results').classList.add('visible');
        }

        function statusBadge(status, reason) {
            if (status === 0) {
                return `<span style="color: #155724; background: #d4edda; padding:4px 8px; border-radius:4px; font-weight:600">OK</span>`;
            } else if (status === 1) {
                return `<span style="color: #856404; background: #fff3cd; padding:4px 8px; border-radius:4px; font-weight:600">Ref &gt; Test</span>`;
            } else {
                return `<span style="color: #721c24; background: #f8d7da; padding:4px 8px; border-radius:4px; font-weight:600">No ref</span>`;
            }
        }

        function createTableWithStatus(products) {
            let html = '<table><thead><tr><th>Джерело</th><th>Назва</th><th>Ціна</th><th>Реф</th><th>Статус</th><th>Посилання</th></tr></thead><tbody>';

            products.forEach(product => {
                const source = escapeHtml(product.source_site || '—');
                const name = escapeHtml(product.name || '—');
                const price = product.price != null ? `${product.price} ${escapeHtml(product.currency || '')}`.trim() : '—';
                let refHtml = '—';
                if (product.ref) {
                    const r = product.ref;
                    refHtml = `${escapeHtml(r.name || '')} — ${r.price != null ? `${r.price} ${escapeHtml(r.currency || '')}` : '—'}`;
                    if (r.url) {
                        refHtml += ` <a href="${escapeHtml(r.url)}" target="_blank">(link)</a>`;
                    }
                }
                const statusCell = statusBadge(product.status, product.status_reason) + (product.status_reason ? ` <div style="font-size:0.8em;color:#666">${escapeHtml(product.status_reason)}</div>` : '');
                const link = product.url ? `<a href="${escapeHtml(product.url)}" target="_blank">Переглянути</a>` : '';

                html += `<tr>
                    <td>${source}</td>
                    <td>${name}</td>
                    <td>${price}</td>
                    <td>${refHtml}</td>
                    <td>${statusCell}</td>
                    <td>${link}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            return html;
        }

        function createSourceBadges(products) {
            return products
                .map(p => `<span class="source-badge">${escapeHtml(p.source_domain)}</span>`)
                .join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('visible', show);
            document.getElementById('submitBtn').disabled = show;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error').classList.remove('visible');
        }
    </script>
</body>
</html>
